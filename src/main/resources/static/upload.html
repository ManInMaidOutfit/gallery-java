<!DOCTYPE html>
<html>
<head>
    <title>Загрузка фото</title>
</head>
<body>
    <h2>Загрузить фото</h2>
    <form action="/photos/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="file" accept="image/*" required>
        <button type="submit">Загрузить</button>
    </form>
</body>
</html>
